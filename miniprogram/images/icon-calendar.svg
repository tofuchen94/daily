<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1677ff"/>
      <stop offset="100%" stop-color="#4096ff"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  
  <!-- 日历主体 -->
  <g transform="translate(30, 32)">
    <rect width="140" height="136" rx="16" fill="white" filter=""/>
    
    <!-- 日历红色头 -->
    <rect x="0" y="0" width="140" height="44" rx="16" fill="#e74c3c"/>
    <rect x="0" y="30" width="140" height="14" fill="#e74c3c"/>
    
    <!-- 年份 -->
    <text x="70" y="30" text-anchor="middle" fill="white" font-size="15" font-family="Arial, sans-serif" font-weight="bold">2026</text>
    
    <!-- 挂环 -->
    <rect x="36" y="-10" width="10" height="14" rx="5" fill="#fff" opacity="0.9"/>
    <rect x="94" y="-10" width="10" height="14" rx="5" fill="#fff" opacity="0.9"/>
    
    <!-- 横线 -->
    <g stroke="#e8e8e8" stroke-width="1.5">
      <line x1="0" y1="60" x2="140" y2="60"/>
      <line x1="0" y1="80" x2="140" y2="80"/>
      <line x1="0" y1="100" x2="140" y2="100"/>
      <line x1="0" y1="120" x2="140" y2="120"/>
    </g>
    <g stroke="#e8e8e8" stroke-width="1.5">
      <line x1="46.7" y1="44" x2="46.7" y2="136"/>
      <line x1="93.3" y1="44" x2="93.3" y2="136"/>
    </g>
    
    <!-- 星期 -->
    <g fill="#999" font-size="11" font-family="Arial, sans-serif" text-anchor="middle">
      <text x="23" y="55">一</text>
      <text x="70" y="55">三</text>
      <text x="116" y="55">五</text>
    </g>
    
    <!-- 日期小圆点 -->
    <g fill="#bbb" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">
      <text x="23" y="74">4</text>
      <text x="70" y="74">6</text>
      <text x="116" y="74">8</text>
      <text x="23" y="94">11</text>
      <text x="70" y="94">13</text>
      <text x="116" y="94">15</text>
    </g>

    <!-- 红色对勾标记 - 15号 ✅ -->
    <circle cx="70" cy="115" r="15" fill="#52c41a"/>
    <path d="M 62 115 L 68 121 L 79 108" stroke="white" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
