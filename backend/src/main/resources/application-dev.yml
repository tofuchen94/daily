# ========== 本地开发 - MySQL（通过环境变量配置）==========
# 必填环境变量：
#   DEV_MYSQL_HOST     - MySQL 服务器地址
#   DEV_MYSQL_USER     - 数据库用户名
#   DEV_MYSQL_PASSWORD - 数据库密码
# 可选环境变量：
#   DEV_MYSQL_PORT     - 端口 (默认 3306)
#   DEV_MYSQL_DB       - 数据库名 (默认 daily)
spring:
  datasource:
    url: jdbc:mysql://${DEV_MYSQL_HOST}:${DEV_MYSQL_PORT:3306}/${DEV_MYSQL_DB:daily}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectTimeout=5000&socketTimeout=30000
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DEV_MYSQL_USER}
    password: ${DEV_MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 5

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.daily: debug

server:
  port: 8080

app:
  schema-location: classpath:schema-mysql.sql
