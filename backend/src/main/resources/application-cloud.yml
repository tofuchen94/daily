# ========== Production - MySQL ==========
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:daily}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectTimeout=5000&socketTimeout=30000
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 10
      initialization-fail-timeout: 10000

logging:
  level:
    com.daily: info
    org.springframework: warn

server:
  port: ${PORT:80}

app:
  schema-location: classpath:schema-mysql.sql
